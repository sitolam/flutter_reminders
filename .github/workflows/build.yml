name: Build APK

on:
  # Build on every push to main
  push:
    branches: [main]
  # Build on pull requests targeting main
  pull_request:
    branches: [main]
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: reminders-apks-split
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: reminders-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
